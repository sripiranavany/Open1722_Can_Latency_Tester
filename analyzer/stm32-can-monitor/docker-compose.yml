version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# STM32 CAN Latency Monitor — Docker stack (no Python bridge, no MQTT)
#
# Flow:  STM32 serial  →  Telegraf (serial input)  →  InfluxDB  →  Grafana
#
# Quick start:
#   docker compose up -d
#   Open Grafana: http://localhost:3000  (admin / admin)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Time-Series Database ───────────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: stm32_influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE:           setup
      DOCKER_INFLUXDB_INIT_USERNAME:       admin
      DOCKER_INFLUXDB_INIT_PASSWORD:       admin1234!
      DOCKER_INFLUXDB_INIT_ORG:            stm32org
      DOCKER_INFLUXDB_INIT_BUCKET:         can_latency
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN:    stm32-super-secret-token-change-me
      DOCKER_INFLUXDB_INIT_RETENTION:      30d
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Serial → InfluxDB pipeline ─────────────────────────────────────────────
  telegraf:
    image: telegraf:1.30
    container_name: stm32_telegraf
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    devices:
      - /dev/ttyACM0:/dev/ttyACM0   # adjust if your board appears on a different port

  # ── Visualization ──────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana-oss:10.4.3
    container_name: stm32_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:                          admin
      GF_SECURITY_ADMIN_PASSWORD:                      admin
      GF_USERS_ALLOW_SIGN_UP:                          false
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH:       /var/lib/grafana/dashboards/can_latency.json
      GF_FEATURE_TOGGLES_ENABLE:                       influxdbBackendMigration
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      influxdb:
        condition: service_healthy

volumes:
  influxdb_data:
  influxdb_config:
  grafana_data:
