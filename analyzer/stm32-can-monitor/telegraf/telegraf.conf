# ─────────────────────────────────────────────────────────────────────────────
# Telegraf — STM32 serial → InfluxDB v2
#
# Reads CSV lines directly from the STM32 UART.
# No Python bridge or MQTT broker needed.
#
# Firmware CSV format (11 data fields after "CSV"):
#   CSV,seq,tx_ticks,rx_ticks,latency_us,jitter_us,
#       min_us,max_us,mean_us,stddev_us,total,lost
# ─────────────────────────────────────────────────────────────────────────────

[global_tags]
  device   = "stm32f439zi"
  can_pair = "can1_to_can2"

[agent]
  interval            = "500ms"
  round_interval      = true
  metric_batch_size   = 5000
  metric_buffer_limit = 50000
  collection_jitter   = "0s"
  flush_interval      = "500ms"
  flush_jitter        = "0s"
  precision           = "1ms"
  omit_hostname       = true

# ── Input: read STM32 serial port, filter CSV lines ──────────────────────────
[[inputs.execd]]
  # Configure baud rate then stream only lines starting with "CSV,"
  command       = ["sh", "-c", "stty -F /dev/ttyACM0 115200 raw -echo cs8 -cstopb -parenb && grep --line-buffered '^CSV,' /dev/ttyACM0"]
  signal        = "none"
  restart_delay = "5s"   # retry if device not ready or disconnected

  data_format   = "csv"
  name_override = "can_latency"

  csv_header_row_count = 0
  csv_trim_space       = true

  # Column names map directly to InfluxDB field names.
  # "_src" captures the literal "CSV" prefix as a tag (ignored in queries).
  # Other names match the Grafana dashboard field filters.
  csv_column_names = [
    "_src",
    "seq",
    "tx_ticks",
    "rx_ticks",
    "latency_us",
    "jitter_us",
    "min_latency_us",
    "max_latency_us",
    "avg_latency_us",
    "stddev_us",
    "total_frames",
    "lost_frames"
  ]
  csv_tag_columns = ["_src"]

# ── Output: InfluxDB v2 ───────────────────────────────────────────────────────
[[outputs.influxdb_v2]]
  urls         = ["http://influxdb:8086"]
  token        = "stm32-super-secret-token-change-me"
  organization = "stm32org"
  bucket       = "can_latency"
  timeout      = "5s"
