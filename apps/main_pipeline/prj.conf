CONFIG_CAN=y
CONFIG_CAN_STATS=y
CONFIG_GPIO=y
# Log settings help with debugging if the bus goes off
CONFIG_LOG=y
CONFIG_CAN_LOG_LEVEL_DBG=y

# Give CAN interrupts higher priority
CONFIG_CAN_INIT_PRIORITY=41

# Increase system clock if not already at max
CONFIG_SYS_CLOCK_HW_CYCLES_PER_SEC=168000000

# Optimize kernel
CONFIG_SCHED_SCALABLE=y
CONFIG_TIMESLICING=n