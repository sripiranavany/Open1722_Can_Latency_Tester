# Networking stack
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_STM32_HAL=y

# AF_PACKET raw Ethernet sockets (needed for AVTP)
CONFIG_NET_SOCKETS_PACKET=y

# POSIX API — enables socket(), bind(), sendto(), close(), etc.
CONFIG_POSIX_API=y

# Network management events (NET_EVENT_IF_UP)
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_DEFAULT_IF_ETHERNET=y

# CAN driver (receive from main_pipeline)
CONFIG_CAN=y
CONFIG_CAN_INIT_PRIORITY=80

# Logging
# CONFIG_LOG=y
CONFIG_LOG=n
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y

# Stack sizes
CONFIG_MAIN_STACK_SIZE=4096
