# Networking stack
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_STM32_HAL=y

CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=64

# AF_PACKET raw Ethernet sockets (needed for AVTP)
CONFIG_NET_SOCKETS_PACKET=y

# POSIX API — enables socket(), bind(), sendto(), close(), etc.
CONFIG_POSIX_API=y

# Network management events (NET_EVENT_IF_UP)
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_DEFAULT_IF_ETHERNET=y

CONFIG_NET_IPV4=n
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=n
CONFIG_NET_UDP=n
CONFIG_NET_STATISTICS=n

# CAN driver (receive from main_pipeline)
CONFIG_CAN=y
CONFIG_CAN_INIT_PRIORITY=80

# Logging
CONFIG_LOG=n
CONFIG_UART_CONSOLE=n

# Stack sizes
CONFIG_MAIN_STACK_SIZE=4096
